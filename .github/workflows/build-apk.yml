name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: aleclearmind/nix-android-ci/.github/workflows/build-sign-release.yml@v1
    secrets:
      keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
    with:
      title: Audix
      apks: '[{"attr": ".#default", "abi": "arm64-v8a"}]'
      artifacts: '[{"attr": ".#web-smoke", "name": "web-smoke", "files": "*.webm"}]'
