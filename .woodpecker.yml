when:
  - event: push
    branch: "main"
  - event: tag
steps:
  - name: flake-ci
    image: debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818
    environment:
      FLAKE_CI_CONFIG:
        from_secret: flake_ci_config
    commands:
      - apt-get update
      - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates curl git xz-utils
      - git clone --depth 1 https://github.com/aleclearmind/flake-ci .flake-ci
      - ./.flake-ci/flake-ci run .
